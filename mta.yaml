_schema-version: "3.1"
ID: arc1-mcp
version: 0.9.27 # x-release-please-version
description: ARC-1 — MCP Server for SAP ABAP Systems

# ──────────────────────────────────────────────────────────────────────
# On-Premise SAP via Cloud Connector + XSUAA OAuth
#
# Deploys ARC-1 as a Node.js app with:
#   - XSUAA for MCP client authentication (Claude Desktop, Cursor, etc.)
#   - Destination Service for SAP system lookup
#   - Connectivity Service for Cloud Connector proxy to on-premise SAP
#
# Prerequisites:
#   1. Cloud Connector configured with virtual host mapping
#   2. BTP Destination pointing to the virtual host
#   3. Users assigned to ARC-1 role collections (see xs-security.json)
#
# Deploy:
#   mbt build && cf deploy mta_archives/arc1-mcp_0.6.1.mtar
#
# Two destinations are recommended for on-premise PP scenarios:
#   1. BasicAuth destination (SAP_BTP_DESTINATION) — used at startup for
#      feature probing and cache warmup. No JWT needed.
#   2. PrincipalPropagation destination (SAP_BTP_PP_DESTINATION) — used at
#      runtime for per-user requests. Requires user JWT.
#
# When using SAP_BTP_DESTINATION, URL/client come from the destination.
# Only set manually if NOT using the Destination Service:
#   cf set-env arc1-mcp-server SAP_URL "http://a4h-abap:50000"
#   cf set-env arc1-mcp-server SAP_CLIENT "001"
#   cf restage arc1-mcp-server
#
# See docs_page/btp-cloud-foundry-deployment.md for full setup guide.
# ──────────────────────────────────────────────────────────────────────

parameters:
  enable-parallel-deployments: true

build-parameters:
  before-all:
    - builder: custom
      commands:
        - npm ci
        - npm run build

modules:
  - name: arc1-mcp-server
    type: nodejs
    path: .
    parameters:
      memory: 512M
      disk-quota: 1024M
      instances: 1
      # No `host:` on purpose. The deploy service then assigns `${default-host}`
      # (derived from org+space+app), which is GLOBALLY unique on the shared
      # `cfapps.<region>.hana.ondemand.com` domain and always DNS-valid. CF
      # routes must be unique across EVERY subaccount on that domain, not just
      # within yours — a fixed `arc1-mcp-<space>` host collides as soon as two
      # landscapes (or a space literally named "mcp") pick the same name.
      # The default route is long/auto-generated; read it back with
      # `cf app arc1-mcp-server`. To deploy under a short URL you choose, pin
      # `host:` in your `mta-overrides.mtaext` (see mta-overrides.mtaext.example).
      health-check-type: http
      health-check-http-endpoint: /health
      # Node heap target sized to 87.5% of dyno memory (512M -> 448M) so V8 GCs
      # cleanly inside the CF cgroup instead of being SIGKILL'd; bump in
      # lockstep when memory: changes.
      command: node --max-old-space-size=448 dist/index.js
      buildpack: nodejs_buildpack
    build-parameters:
      builder: custom
      commands: []
      ignore:
        - .env
        - .git/
        - src/
        - tests/
        - docs/
        - skills/
        - coverage/
        - test-results/
        - "*.md"
        - .github/
        - .husky/
        - .vscode/
        - .claude/
        - mta_archives/
        - mta-op-*/
        - node_modules/
        - scripts/
        - reports/
        - research/
    properties:
      SAP_TRANSPORT: http-streamable
      SAP_SYSTEM_TYPE: auto
      SAP_LANGUAGE: EN
      SAP_INSECURE: "false"
      SAP_XSUAA_AUTH: "true"
      # DCR client_id lifetime. "0" = never expire (a finite TTL only causes
      # periodic invalid_client re-auth outages — some MCP clients don't
      # recover). NOTE: ARC1_DCR_SIGNING_SECRET is deliberately NOT set here
      # (module properties are rewritten on every cf deploy); set it once via
      # cf set-env — see docs_page/xsuaa-setup.md "Stable DCR signing key".
      ARC1_OAUTH_DCR_TTL_SECONDS: "0"
      # Destinations. The base values below are placeholders — every landscape
      # MUST override them via `mta-overrides.mtaext` (see the
      # `mta-overrides.mtaext.example` template in this repo) or via
      # `cf set-env`. Deploying with the placeholders will fail at startup with
      # a "destination not found" error from BTP, which is the intended signal.
      #
      # BasicAuth destination for startup (feature probing, cache warmup)
      SAP_BTP_DESTINATION: your-basic-destination
      # PrincipalPropagation destination for per-user requests (with JWT)
      SAP_BTP_PP_DESTINATION: your-pp-destination
      SAP_PP_ENABLED: "true"
      # Recommended default: accept only JWT-backed per-user SAP calls. Set false
      # via an override for supported mixed PP/API-key operation in one instance.
      SAP_PP_STRICT: "true"
      # Authorization / safety defaults. Keep the MTA conservative; widen per
      # landscape via `mta-overrides.mtaext` or `cf set-env` only when the
      # target system actually needs it.
      SAP_ALLOW_WRITES: "false"
      SAP_ALLOW_DATA_PREVIEW: "false"
      SAP_ALLOW_FREE_SQL: "false"
      SAP_ALLOW_TRANSPORT_WRITES: "false"
      SAP_ALLOW_GIT_WRITES: "false"
      SAP_ALLOWED_PACKAGES: "$TMP"
      # Experimental read-only UI. Keep off in the base descriptor; opt in
      # per landscape with ARC1_UI=web in mta-overrides.mtaext.
      ARC1_UI: "off"
      # CORS — empty (default) disables CORS entirely. Set per landscape via
      # `mta-overrides.mtaext` or `cf set-env` only when a browser UI talks to
      # /mcp directly. Native MCP clients (Claude Desktop, Cursor, VS Code,
      # Copilot Studio) don't need this. Comma-separated, exact match, no
      # wildcards.
      ARC1_ALLOWED_ORIGINS: ""
    provides:
      - name: arc1-mcp-api
        properties:
          url: ${default-url}
    requires:
      - name: arc1-xsuaa
      - name: arc1-destination
      - name: arc1-connectivity
      # Bound only when the (deprecated) application-logs resource is active —
      # off by default; skipped automatically while inactive. See resource below.
      - name: arc1-application-logs

  # Optional browser entry point for the experimental read-only UI. It is
  # excluded by default so the base MTA still deploys one CF app. Include it
  # with `mta-ui-approuter.mtaext`; the AppRouter performs interactive XSUAA login,
  # checks the admin scope, and forwards the user JWT to `/ui/*` on ARC-1.
  - name: arc1-ui-router
    type: approuter.nodejs
    path: btp/approuter
    build-parameters:
      builder: custom
      commands: []
      supported-platforms: []
      ignore:
        - node_modules/
    parameters:
      memory: 128M
      disk-quota: 256M
      instances: 1
      buildpack: nodejs_buildpack
    requires:
      - name: arc1-xsuaa
      - name: arc1-mcp-api
        group: destinations
        properties:
          name: arc1-backend
          url: ~{url}
          forwardAuthToken: true

resources:
  - name: arc1-xsuaa
    type: com.sap.xs.uaa
    parameters:
      service-plan: application
      # `path` supplies scopes + role-templates + oauth2-configuration; the
      # inline `config` below overrides/augments it (config wins on merge).
      path: xs-security.json
      config:
        # xsappname must be unique per SUBACCOUNT — derive it from the space so
        # the same mtar can be deployed into multiple spaces side by side.
        xsappname: arc1-mcp-${space}
        # Role-collection names are also subaccount-scoped. They live here (not
        # in xs-security.json) because `${space}` is only resolved in descriptor
        # values, not inside the path-referenced JSON. Defining the array here
        # replaces the file's role-collections wholesale; scopes + role-templates
        # stay in xs-security.json ($XSAPPNAME already namespaces the templates).
        role-collections:
          - name: "ARC-1 Viewer (${space})"
            description: "Read-only SAP access via ARC-1 MCP"
            role-template-references:
              - "$XSAPPNAME.MCPViewer"
          - name: "ARC-1 Developer (${space})"
            description: "Read, write, transport, and git access via ARC-1 MCP"
            role-template-references:
              - "$XSAPPNAME.MCPDeveloper"
          - name: "ARC-1 Data Viewer (${space})"
            description: "Read-only SAP access with table data preview"
            role-template-references:
              - "$XSAPPNAME.MCPViewer"
              - "$XSAPPNAME.MCPDataViewer"
          - name: "ARC-1 Viewer + SQL (${space})"
            description: "Read-only SAP access with table data preview and freestyle SQL"
            role-template-references:
              - "$XSAPPNAME.MCPViewer"
              - "$XSAPPNAME.MCPSqlUser"
          - name: "ARC-1 Developer + Data (${space})"
            description: "Developer access with table data preview"
            role-template-references:
              - "$XSAPPNAME.MCPDeveloper"
              - "$XSAPPNAME.MCPDataViewer"
          - name: "ARC-1 Developer + SQL (${space})"
            description: "Developer access with freestyle SQL queries"
            role-template-references:
              - "$XSAPPNAME.MCPDeveloper"
              - "$XSAPPNAME.MCPSqlUser"
          - name: "ARC-1 Admin (${space})"
            description: "Full ARC-1 administrative access (admin implies all scopes)"
            role-template-references:
              - "$XSAPPNAME.MCPAdmin"

  - name: arc1-destination
    type: org.cloudfoundry.managed-service
    parameters:
      service: destination
      service-plan: lite

  - name: arc1-connectivity
    type: org.cloudfoundry.managed-service
    parameters:
      service: connectivity
      service-plan: lite

  # SAP Application Logging Service — OFF by default (`active: false`).
  # The service is DEPRECATED: SAP removed it from the list of Eligible Cloud
  # Services on 2025-07-31 (SAP Note 3557260; replacement: SAP Cloud Logging).
  # Binding it by default would warn on subaccounts that still have it and
  # HARD-FAIL the deploy on newer subaccounts where it is no longer offered.
  # ARC-1 logs to stderr regardless, so `cf logs` / `cf logs --recent` keep
  # working without it — only the managed aggregation backend (Kibana) is gone.
  # To re-enable CF log aggregation on a subaccount that still offers the
  # service, flip `active: true` in your `mta-overrides.mtaext` (see the
  # template). `active` is overridable per-deploy via an extension descriptor;
  # the module `requires:` entry above stays put and is simply skipped while
  # the resource is inactive.
  - name: arc1-application-logs
    type: org.cloudfoundry.managed-service
    active: false
    parameters:
      service: application-logs
      service-plan: lite

name: Release

on:
  push:
    branches: [main]

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7  # v5
        id: release
        # No release-type here — the action reads release-please-config.json,
        # which sets bump-minor-pre-major: true so breaking changes only bump
        # the minor version while the package is pre-1.0.0.

  # npm publishes independently of the Docker CVE gate — a HIGH/CRITICAL finding
  # blocks the Docker image but not the npm package. (The scheduled security-scan.yml
  # gate-preview is what keeps base-image CVEs from reaching a release in the first
  # place, so the two artifacts rarely diverge.)
  publish-npm:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install npm 11.5+ (required for OIDC trusted publishing)
        run: |
          # Workaround for Node.js v22 bundled npm bug (https://github.com/npm/cli/issues/9151)
          npm install --global npm@11.11.1
          npm install --global npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      # Coverage — informational only, does not block release
      - name: Run coverage (informational)
        run: npm run test:coverage
        continue-on-error: true

      - name: Coverage summary
        if: always()
        run: node scripts/ci/coverage-summary.mjs
        continue-on-error: true

      - name: Build
        run: npm run build

      - name: Publish to npm
        run: npm publish --provenance --access public

  # Build the MCPB (.mcpb) bundle and attach it to the GitHub Release so users can
  # one-click install ARC-1 in Claude Desktop (Settings → Extensions, or double-click).
  # The bundle is pure-JS and cross-platform: better-sqlite3 (a native module with no
  # prebuilds) is omitted, and the server falls back to the in-memory cache at runtime
  # (createCachingLayer in src/server/server.ts catches the missing module). The MCPB
  # manifest version is kept in sync with package.json by release-please.
  build-mcpb:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Assemble bundle (pure-JS, native better-sqlite3 omitted)
        run: |
          mkdir -p mcpb-bundle
          cp mcpb-manifest.json mcpb-bundle/manifest.json
          cp icon.png mcpb-bundle/
          cp -r dist mcpb-bundle/dist
          cp package.json package-lock.json mcpb-bundle/
          ( cd mcpb-bundle && npm ci --omit=dev --ignore-scripts )
          rm -rf mcpb-bundle/node_modules/better-sqlite3

      - name: Smoke-test the assembled bundle boots (stdio)
        # Guards the prune: if better-sqlite3 (or a future second native/pruned dep) is actually
        # load-bearing at startup, this fails the release instead of shipping a broken .mcpb.
        run: |
          SAP_URL=http://127.0.0.1:1 SAP_USER=x SAP_PASSWORD=x \
            node mcpb-bundle/dist/index.js >/tmp/mcpb-smoke.log 2>&1 &
          PID=$!
          sleep 5
          kill "$PID" 2>/dev/null || true
          if ! grep -q "running on stdio" /tmp/mcpb-smoke.log; then
            echo "::error::Assembled MCPB bundle failed to boot — a pruned dependency may be load-bearing"
            cat /tmp/mcpb-smoke.log
            exit 1
          fi

      - name: Validate and pack
        # Pin the MCPB CLI (not @latest) so the release is reproducible and a CLI change can't
        # silently alter the artifact — bump deliberately, like the SHA-pinned actions above.
        # Do NOT `mcpb sign` — it appends a ~2.3KB MCPB_SIG_V1 block AFTER the ZIP EOCD record,
        # which strict third-party MCPB/DXT hosts reject ("extra bytes at the end of the file").
        # The official build flow is `mcpb init` → `mcpb pack` (no sign step); Claude Desktop installs
        # unsigned bundles after an "Install Anyway" prompt and self-signing adds no real trust.
        env:
          MCPB: '@anthropic-ai/mcpb@2.1.2'
        run: |
          VERSION="${{ needs.release-please.outputs.tag_name }}"
          VERSION="${VERSION#v}"
          npx --yes "$MCPB" validate mcpb-bundle/manifest.json
          npx --yes "$MCPB" pack mcpb-bundle "arc-1-${VERSION}.mcpb"

      - name: Attach .mcpb to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ needs.release-please.outputs.tag_name }}" arc-1-*.mcpb --clobber

  # Publish server metadata to the Official MCP Registry.
  # This makes ARC-1 discoverable in VS Code (@mcp search), GitHub MCP Registry,
  # and other MCP clients that consume the registry API.
  publish-mcp-registry:
    needs: [release-please, publish-npm, publish-docker-merge]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v7

      - name: Install mcp-publisher
        run: |
          curl -sL "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_linux_amd64.tar.gz" | tar xz mcp-publisher

      - name: Authenticate to MCP Registry (GitHub OIDC)
        run: ./mcp-publisher login github-oidc

      - name: Update version in server.json
        run: |
          set -o pipefail

          VERSION="${{ needs.release-please.outputs.tag_name }}"
          VERSION="${VERSION#v}"
          OCI_IMAGE="ghcr.io/arc-mcp/arc-1:${VERSION}"
          GHCR_REPOSITORY="arc-mcp/arc-1"
          GHCR_TOKEN_URL="https://ghcr.io/token?service=ghcr.io&scope=repository:${GHCR_REPOSITORY}:pull"
          GHCR_MANIFEST_URL="https://ghcr.io/v2/${GHCR_REPOSITORY}/manifests/${VERSION}"
          GHCR_ACCEPT="application/vnd.oci.image.index.v1+json,application/vnd.docker.distribution.manifest.list.v2+json,application/vnd.oci.image.manifest.v1+json,application/vnd.docker.distribution.manifest.v2+json"

          OCI_PUBLIC=false
          for attempt in 1 2 3; do
            if TOKEN=$(curl -fsSL "$GHCR_TOKEN_URL" 2>/dev/null | jq -er .token); then
              if curl -fsSL \
                -H "Authorization: Bearer $TOKEN" \
                -H "Accept: $GHCR_ACCEPT" \
                "$GHCR_MANIFEST_URL" >/dev/null 2>&1; then
                OCI_PUBLIC=true
                break
              fi
            fi
            echo "OCI image $OCI_IMAGE is not anonymously pullable yet (attempt $attempt/3)"
            if [[ "$attempt" != "3" ]]; then
              sleep 10
            fi
          done

          if [[ "$OCI_PUBLIC" == "true" ]]; then
            echo "Including public OCI package $OCI_IMAGE in MCP Registry metadata"
            jq --arg v "$VERSION" --arg image "$OCI_IMAGE" '
              .version = $v |
              (.packages[] | select(.registryType == "npm").version) = $v |
              (.packages[] | select(.registryType == "oci").identifier) = $image
            ' server.json > server.tmp
          else
            echo "::warning::Skipping OCI package in MCP Registry metadata because $OCI_IMAGE is not publicly pullable"
            jq --arg v "$VERSION" '
              .version = $v |
              (.packages[] | select(.registryType == "npm").version) = $v |
              .packages |= map(select(.registryType != "oci"))
            ' server.json > server.tmp
          fi
          mv server.tmp server.json

      - name: Validate server.json
        run: ./mcp-publisher validate server.json

      - name: Publish to MCP Registry
        run: ./mcp-publisher publish

  # Build Docker images natively per architecture (no QEMU emulation).
  # better-sqlite3 has no Node.js prebuilds — it always compiles via node-gyp,
  # which crashes under QEMU arm64 emulation (signal 4: Illegal instruction).
  publish-docker:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
      # Trivy uploads SARIF findings to the Security tab.
      security-events: write
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c  # v4

      - name: Login to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0  # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302  # v6
        with:
          images: ghcr.io/arc-mcp/arc-1
          tags: |
            type=raw,value=latest
            type=semver,pattern={{version}},value=${{ needs.release-please.outputs.tag_name }}
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.release-please.outputs.tag_name }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a  # v7
        with:
          context: .
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,"name=ghcr.io/arc-mcp/arc-1",push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ github.repository }}-${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=${{ github.repository }}-${{ matrix.platform }}

      # Trivy: scan the freshly-built release image for OS-level + JS-level
      # CVEs. GATING on the release path — exit-code 1 fails the release
      # if HIGH/CRITICAL CVEs are present, so customers pulling :vX.Y.Z
      # get a CVE-clean image. (Dev-push docker.yml runs the same scan
      # but non-gating, so iteration isn't blocked.)
      - name: Scan image with Trivy (gating)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        # Pin the scan to the matrix platform. buildx with provenance attestation
        # wraps each push-by-digest output in an OCI index; without TRIVY_PLATFORM,
        # Trivy defaults to linux/amd64 and fails on the arm64 runner with
        # "no child with platform linux/amd64 in index".
        env:
          TRIVY_PLATFORM: ${{ matrix.platform }}
        with:
          image-ref: ghcr.io/arc-mcp/arc-1@${{ steps.build.outputs.digest }}
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL
          # With format=sarif, trivy-action builds the report (and evaluates exit-code)
          # across ALL severities unless this is set — so `severity: HIGH,CRITICAL` is
          # ignored for gating and exit-code:1 fires on MEDIUM/LOW too. That's what blocked
          # the 0.9.10 Docker publish (new MEDIUM hono advisories), even though the image has
          # zero HIGH/CRITICAL. limit-severities-for-sarif makes the gate honor the filter.
          limit-severities-for-sarif: true
          exit-code: '1'

      - name: Upload Trivy SARIF
        # always() so a Trivy CVE gate failure (exit-code 1) still uploads findings,
        # but only when the scan actually produced the SARIF — otherwise an upstream
        # buildx/build failure (e.g. transient Docker Hub timeout) cascades into a
        # confusing "Path does not exist: trivy-results.sarif" that masks the real error.
        if: always() && steps.build.outcome == 'success'
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif
          category: trivy-release-${{ matrix.platform }}

      - name: Export digest
        run: |
          mkdir -p ${{ runner.temp }}/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v7
        with:
          name: docker-digests-${{ matrix.runner }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  # Merge per-arch images into a single multi-arch manifest
  publish-docker-merge:
    needs: [release-please, publish-docker]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          path: ${{ runner.temp }}/digests
          pattern: docker-digests-*
          merge-multiple: true

      - name: Login to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0  # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302  # v6
        with:
          images: ghcr.io/arc-mcp/arc-1
          tags: |
            type=raw,value=latest
            type=semver,pattern={{version}},value=${{ needs.release-please.outputs.tag_name }}
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.release-please.outputs.tag_name }}

      - name: Create manifest list and push
        working-directory: ${{ runner.temp }}/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf 'ghcr.io/arc-mcp/arc-1@sha256:%s ' *)

name: Release

on:
  push:
    branches: [main]

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7  # v5
        id: release
        # No release-type here — the action reads release-please-config.json,
        # which sets bump-minor-pre-major: true so breaking changes only bump
        # the minor version while the package is pre-1.0.0.

  publish-npm:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install npm 11.5+ (required for OIDC trusted publishing)
        run: |
          # Workaround for Node.js v22 bundled npm bug (https://github.com/npm/cli/issues/9151)
          npm install --global npm@11.11.1
          npm install --global npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      # Coverage — informational only, does not block release
      - name: Run coverage (informational)
        run: npm run test:coverage
        continue-on-error: true

      - name: Coverage summary
        if: always()
        run: node scripts/ci/coverage-summary.mjs
        continue-on-error: true

      - name: Build
        run: npm run build

      - name: Publish to npm
        run: npm publish --provenance --access public

  # Publish server metadata to the Official MCP Registry.
  # This makes ARC-1 discoverable in VS Code (@mcp search), GitHub MCP Registry,
  # and other MCP clients that consume the registry API.
  publish-mcp-registry:
    needs: [release-please, publish-npm, publish-docker-merge]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - name: Install mcp-publisher
        run: |
          curl -sL "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_linux_amd64.tar.gz" | tar xz mcp-publisher

      - name: Authenticate to MCP Registry (GitHub OIDC)
        run: ./mcp-publisher login github-oidc

      - name: Update version in server.json
        run: |
          VERSION=$(echo "${{ needs.release-please.outputs.tag_name }}" | sed 's/^v//')
          jq --arg v "$VERSION" '
            .version = $v |
            .packages[0].version = $v |
            .packages[1].identifier = "ghcr.io/marianfoo/arc-1:" + $v
          ' server.json > server.tmp && mv server.tmp server.json

      - name: Validate server.json
        run: ./mcp-publisher validate server.json

      - name: Publish to MCP Registry
        run: ./mcp-publisher publish

  # Build Docker images natively per architecture (no QEMU emulation).
  # better-sqlite3 has no Node.js prebuilds — it always compiles via node-gyp,
  # which crashes under QEMU arm64 emulation (signal 4: Illegal instruction).
  publish-docker:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
      # Trivy uploads SARIF findings to the Security tab.
      security-events: write
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4

      - name: Login to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee  # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9  # v6
        with:
          images: ghcr.io/marianfoo/arc-1
          tags: |
            type=raw,value=latest
            type=semver,pattern={{version}},value=${{ needs.release-please.outputs.tag_name }}
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.release-please.outputs.tag_name }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf  # v7
        with:
          context: .
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,"name=ghcr.io/marianfoo/arc-1",push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ github.repository }}-${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=${{ github.repository }}-${{ matrix.platform }}

      # Trivy: scan the freshly-built release image for OS-level + JS-level
      # CVEs. GATING on the release path — exit-code 1 fails the release
      # if HIGH/CRITICAL CVEs are present, so customers pulling :vX.Y.Z
      # get a CVE-clean image. (Dev-push docker.yml runs the same scan
      # but non-gating, so iteration isn't blocked.)
      - name: Scan image with Trivy (gating)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        # Pin the scan to the matrix platform. buildx with provenance attestation
        # wraps each push-by-digest output in an OCI index; without TRIVY_PLATFORM,
        # Trivy defaults to linux/amd64 and fails on the arm64 runner with
        # "no child with platform linux/amd64 in index".
        env:
          TRIVY_PLATFORM: ${{ matrix.platform }}
        with:
          image-ref: ghcr.io/marianfoo/arc-1@${{ steps.build.outputs.digest }}
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL
          exit-code: '1'

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif
          category: trivy-release-${{ matrix.platform }}

      - name: Export digest
        run: |
          mkdir -p ${{ runner.temp }}/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v7
        with:
          name: docker-digests-${{ matrix.runner }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  # Merge per-arch images into a single multi-arch manifest
  publish-docker-merge:
    needs: [release-please, publish-docker]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          path: ${{ runner.temp }}/digests
          pattern: docker-digests-*
          merge-multiple: true

      - name: Login to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee  # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9  # v6
        with:
          images: ghcr.io/marianfoo/arc-1
          tags: |
            type=raw,value=latest
            type=semver,pattern={{version}},value=${{ needs.release-please.outputs.tag_name }}
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.release-please.outputs.tag_name }}

      - name: Create manifest list and push
        working-directory: ${{ runner.temp }}/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf 'ghcr.io/marianfoo/arc-1@sha256:%s ' *)

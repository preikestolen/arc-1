name: Test

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  # Manual trigger so chore: PRs (and any other skipped PR) can be tested on demand.
  workflow_dispatch:

# Minimum required GITHUB_TOKEN permissions — closes CodeQL
# `actions/missing-workflow-permissions` alerts. All jobs only need to read
# the repo (artifact upload via `actions/upload-artifact@v4+` does not need
# additional permissions; SAP secrets are passed via `env:` from `secrets.*`).
permissions:
  contents: read
  pull-requests: read

env:
  SAP_CI_TARGET_LABEL: A4H 2025

jobs:
  # Smoke check that mta.yaml + the .mtaext.example template are valid MTA
  # descriptors. Runs on every PR + manual dispatch (no SAP secrets needed)
  # so a broken YAML or schema regression is caught before it reaches BTP
  # deploys. Independent of the SAP-test gate — always runs.
  mta-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Validate mta.yaml + mta-overrides.mtaext.example
        run: npm run btp:validate

  # Gates only the SAP-hitting jobs below based on PR title (conventional
  # commit prefix). Cheap checks in the `test` job always run. SAP jobs skip on
  # `docs:` and `chore:` PRs to save SAP work processes; auto-run for everything
  # else (`fix:`, `feat:`, `test:`, `refactor:`, etc.). Manual dispatch always
  # passes — chore PRs can be tested via the "Run workflow" button when needed.
  gate:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' &&
       !startsWith(github.event.pull_request.title, 'docs:') &&
       !startsWith(github.event.pull_request.title, 'docs(') &&
       !startsWith(github.event.pull_request.title, 'chore:') &&
       !startsWith(github.event.pull_request.title, 'chore('))
    steps:
      - name: Tests will run
        run: |
          echo "event=${{ github.event_name }}"
          echo "pr_title=${{ github.event.pull_request.title }}"

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22, 24]

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Block PRs that introduce known HIGH/CRITICAL advisories before
      # slower steps run. Audits production AND dev deps — a compromised
      # dev dep (test runner, linter) can poison the published artifact.
      # Threshold = high (moderate is too noisy for transitive deps).
      - name: Security audit (npm audit)
        run: npm audit --audit-level=high --omit=optional

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: npx package smoke test
        run: npm run test:npx-smoke

      - name: Run unit tests
        run: npm test

      - name: Upload unit test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-unit-${{ matrix.node-version }}
          path: test-results/unit.json
          retention-days: 7
          if-no-files-found: warn

      # Coverage — informational only, does not block the build
      - name: Run coverage (informational)
        run: npm run test:coverage
        continue-on-error: true

      - name: Coverage summary
        if: always()
        run: node scripts/ci/coverage-summary.mjs
        continue-on-error: true

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-${{ matrix.node-version }}
          path: coverage/
          retention-days: 7
        continue-on-error: true

  # Cheap guard that runs before any SAP-serialized job. Stale PR runs should
  # finish their unit/security checks, but they must not wait for or consume the
  # repository-wide live SAP concurrency slot after a newer PR head exists.
  sap-run-guard:
    runs-on: ubuntu-latest
    needs: [test, gate]
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' &&
       github.event.pull_request.head.repo.full_name == github.repository &&
       needs.gate.result == 'success' &&
       needs.test.result == 'success')
    outputs:
      current: ${{ steps.current.outputs.current }}
      reason: ${{ steps.current.outputs.reason }}
    steps:
      - name: Check PR head freshness
        id: current
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_NAME: ${{ github.event_name }}
          REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          EVENT_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          if [ "${EVENT_NAME}" != "pull_request" ]; then
            echo "current=true" >> "$GITHUB_OUTPUT"
            echo "reason=workflow_dispatch" >> "$GITHUB_OUTPUT"
            echo "Manual workflow dispatch: SAP jobs are allowed."
            exit 0
          fi

          latest_head_sha="$(gh api "repos/${REPOSITORY}/pulls/${PR_NUMBER}" --jq '.head.sha')"
          echo "event_head_sha=${EVENT_HEAD_SHA}"
          echo "latest_head_sha=${latest_head_sha}"
          if [ "${latest_head_sha}" = "${EVENT_HEAD_SHA}" ]; then
            echo "current=true" >> "$GITHUB_OUTPUT"
            echo "reason=current" >> "$GITHUB_OUTPUT"
            echo "This PR run is current: SAP jobs are allowed."
          else
            echo "current=false" >> "$GITHUB_OUTPUT"
            echo "reason=stale:${EVENT_HEAD_SHA}->${latest_head_sha}" >> "$GITHUB_OUTPUT"
            echo "This PR run is stale: SAP jobs will be skipped before entering live SAP concurrency."
          fi

  # Run on internal PRs and manual dispatch; skip external fork PRs (no secrets)
  integration:
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.repository }}-sap-live-a4h
      cancel-in-progress: false
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' &&
       github.event.pull_request.head.repo.full_name == github.repository &&
       needs.gate.result == 'success' &&
       needs.test.result == 'success' &&
       needs.sap-run-guard.outputs.current == 'true')
    needs: [test, gate, sap-run-guard]

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: SAP auth preflight (integration)
        id: sap_auth
        shell: bash
        env:
          SAP_CI_TARGET_LABEL: ${{ env.SAP_CI_TARGET_LABEL }}
          TEST_SAP_URL: ${{ secrets.TEST_SAP_URL }}
          TEST_SAP_USER: ${{ secrets.TEST_SAP_USER }}
          TEST_SAP_PASSWORD: ${{ secrets.TEST_SAP_PASSWORD }}
          TEST_SAP_CLIENT: ${{ secrets.TEST_SAP_CLIENT }}
          TEST_SAP_INSECURE: ${{ secrets.TEST_SAP_INSECURE }}
        run: |
          missing=()
          for name in TEST_SAP_URL TEST_SAP_USER TEST_SAP_PASSWORD TEST_SAP_CLIENT; do
            if [ -z "${!name:-}" ]; then
              missing+=("${name}")
            fi
          done
          if [ "${#missing[@]}" -gt 0 ]; then
            echo "::error title=Integration preflight failed::Missing required ${SAP_CI_TARGET_LABEL} secret(s): ${missing[*]}"
            exit 1
          fi

          base_url="${TEST_SAP_URL%/}"
          probe_url="${base_url}/sap/bc/adt/core/discovery?sap-client=${TEST_SAP_CLIENT}"
          curl_args=(--silent --show-error --location --output /tmp/adt-discovery-integration.xml --write-out "%{http_code}")
          case "${TEST_SAP_INSECURE,,}" in
            true|1|yes) curl_args+=(--insecure) ;;
          esac
          status="$(curl "${curl_args[@]}" -u "${TEST_SAP_USER}:${TEST_SAP_PASSWORD}" "${probe_url}" || true)"
          echo "status=${status}"
          if [ "${status}" != "200" ]; then
            echo "::error title=Integration preflight failed::${SAP_CI_TARGET_LABEL} authenticated ADT discovery returned HTTP ${status}; integration tests require a reachable target and valid TEST_SAP_* secrets."
            exit 1
          fi
          echo "auth_ok=true" >> "$GITHUB_OUTPUT"

      - name: Run integration tests
        if: steps.sap_auth.outputs.auth_ok == 'true'
        run: npm run test:integration
        env:
          TEST_SAP_URL: ${{ secrets.TEST_SAP_URL }}
          TEST_SAP_USER: ${{ secrets.TEST_SAP_USER }}
          TEST_SAP_PASSWORD: ${{ secrets.TEST_SAP_PASSWORD }}
          TEST_SAP_CLIENT: ${{ secrets.TEST_SAP_CLIENT }}
          TEST_SAP_INSECURE: ${{ secrets.TEST_SAP_INSECURE }}

      - name: Upload integration test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-integration
          path: |
            test-results/integration.json
            test-results/integration-skips.ndjson
          retention-days: 7
          if-no-files-found: warn

      - name: Integration reliability summary
        if: always()
        run: node scripts/ci/collect-test-reliability.mjs --results-dir test-results
        continue-on-error: true

  # Run on internal PRs and manual dispatch; skip external fork PRs (no secrets)
  # Runs AFTER integration to avoid both jobs hitting SAP simultaneously.
  # Uses always() so e2e still runs even if integration fails (SAP flakes).
  e2e:
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.repository }}-sap-live-a4h
      cancel-in-progress: false
    if: >
      always() &&
      needs.gate.result == 'success' &&
      needs.test.result == 'success' &&
      needs.sap-run-guard.outputs.current == 'true' &&
      (github.event_name == 'workflow_dispatch' ||
       (github.event_name == 'pull_request' &&
        github.event.pull_request.head.repo.full_name == github.repository))
    needs: [test, gate, sap-run-guard, integration]
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: SAP auth preflight (e2e)
        id: sap_auth
        shell: bash
        env:
          SAP_CI_TARGET_LABEL: ${{ env.SAP_CI_TARGET_LABEL }}
          TEST_SAP_URL: ${{ secrets.TEST_SAP_URL }}
          TEST_SAP_USER: ${{ secrets.TEST_SAP_USER }}
          TEST_SAP_PASSWORD: ${{ secrets.TEST_SAP_PASSWORD }}
          TEST_SAP_CLIENT: ${{ secrets.TEST_SAP_CLIENT }}
          TEST_SAP_INSECURE: ${{ secrets.TEST_SAP_INSECURE }}
        run: |
          missing=()
          for name in TEST_SAP_URL TEST_SAP_USER TEST_SAP_PASSWORD TEST_SAP_CLIENT; do
            if [ -z "${!name:-}" ]; then
              missing+=("${name}")
            fi
          done
          if [ "${#missing[@]}" -gt 0 ]; then
            echo "::error title=E2E preflight failed::Missing required ${SAP_CI_TARGET_LABEL} secret(s): ${missing[*]}"
            exit 1
          fi

          base_url="${TEST_SAP_URL%/}"
          probe_url="${base_url}/sap/bc/adt/core/discovery?sap-client=${TEST_SAP_CLIENT}"
          curl_args=(--silent --show-error --location --output /tmp/adt-discovery-e2e.xml --write-out "%{http_code}")
          case "${TEST_SAP_INSECURE,,}" in
            true|1|yes) curl_args+=(--insecure) ;;
          esac
          status="$(curl "${curl_args[@]}" -u "${TEST_SAP_USER}:${TEST_SAP_PASSWORD}" "${probe_url}" || true)"
          echo "status=${status}"
          if [ "${status}" != "200" ]; then
            echo "::error title=E2E preflight failed::${SAP_CI_TARGET_LABEL} authenticated ADT discovery returned HTTP ${status}; E2E tests require a reachable target and valid TEST_SAP_* secrets."
            exit 1
          fi
          echo "auth_ok=true" >> "$GITHUB_OUTPUT"

      - name: Build
        if: steps.sap_auth.outputs.auth_ok == 'true'
        run: npm run build

      - name: Start MCP server (local)
        if: steps.sap_auth.outputs.auth_ok == 'true'
        run: npm run test:e2e:start
        env:
          SAP_URL: ${{ secrets.TEST_SAP_URL }}
          SAP_USER: ${{ secrets.TEST_SAP_USER }}
          SAP_PASSWORD: ${{ secrets.TEST_SAP_PASSWORD }}
          SAP_CLIENT: ${{ secrets.TEST_SAP_CLIENT }}
          SAP_INSECURE: ${{ secrets.TEST_SAP_INSECURE }}

      - name: Run E2E tests
        if: steps.sap_auth.outputs.auth_ok == 'true'
        run: npm run test:e2e
        env:
          E2E_MCP_URL: http://localhost:3000/mcp
          SAP_URL: ${{ secrets.TEST_SAP_URL }}
          SAP_USER: ${{ secrets.TEST_SAP_USER }}
          SAP_PASSWORD: ${{ secrets.TEST_SAP_PASSWORD }}
          SAP_CLIENT: ${{ secrets.TEST_SAP_CLIENT }}
          SAP_INSECURE: ${{ secrets.TEST_SAP_INSECURE }}

      - name: Upload E2E JSON test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-e2e
          path: |
            test-results/e2e.json
            test-results/e2e-skips.ndjson
          retention-days: 7
          if-no-files-found: warn

      - name: E2E reliability summary
        if: always()
        run: node scripts/ci/collect-test-reliability.mjs --results-dir test-results
        continue-on-error: true

      - name: Stop MCP server
        if: always()
        run: npm run test:e2e:stop

      - name: Upload E2E logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-logs
          path: /tmp/arc1-e2e-logs/
          retention-days: 7

      - name: Upload JUnit results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-junit
          path: /tmp/arc1-e2e-logs/junit-results.xml
          retention-days: 7

  reliability-summary:
    # Run on success or failure of upstream jobs, but only when the gate allowed
    # the workflow to run in the first place — avoids a noisy "no results" summary
    # on docs/chore PRs that skipped the test pipeline.
    if: ${{ always() && !cancelled() && needs.gate.result == 'success' }}
    runs-on: ubuntu-latest
    needs: [gate, test, sap-run-guard, integration, e2e]

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download test result artifacts
        if: always()
        uses: actions/download-artifact@v8
        with:
          pattern: test-results-*
          path: downloaded-test-results
          merge-multiple: true

      - name: Download E2E JUnit artifacts
        if: always()
        uses: actions/download-artifact@v8
        with:
          pattern: e2e-junit
          path: downloaded-junit
          merge-multiple: true
        continue-on-error: true

      - name: Normalize test result files
        if: always()
        run: |
          mkdir -p test-results
          find downloaded-test-results -name unit.json -print -quit | xargs -I{} cp {} test-results/unit.json || true
          find downloaded-test-results -name integration.json -print -quit | xargs -I{} cp {} test-results/integration.json || true
          find downloaded-test-results -name e2e.json -print -quit | xargs -I{} cp {} test-results/e2e.json || true
          find downloaded-test-results -name integration-skips.ndjson -print -quit | xargs -I{} cp {} test-results/integration-skips.ndjson || true
          find downloaded-test-results -name e2e-skips.ndjson -print -quit | xargs -I{} cp {} test-results/e2e-skips.ndjson || true

      - name: Collect reliability summary
        if: always()
        run: npm run test:reliability-report -- --results-dir test-results
        continue-on-error: true

      - name: Collect runtime summary
        if: always()
        run: npm run test:runtime-report -- --results-dir test-results --junit-dir downloaded-junit
        continue-on-error: true

      - name: Assert required execution (warn mode)
        if: always()
        run: npm run test:assert-execution -- --results-dir test-results --mode warn
        continue-on-error: true

# PR-time dependency review — fails the PR check when a contributor
# adds a dependency with a known HIGH/CRITICAL advisory or an
# incompatible license. Complements Dependabot (post-fact patches) by
# catching introductions before merge. Documented in
# docs/plans/2026-05-08-dependency-security-tier1-foundation.md (SEC-11).

name: Dependency Review

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Dependency Review
        uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: high
          comment-summary-in-pr: on-failure
          # Block copyleft licenses that would contaminate the MIT-
          # licensed npm package. The action requires choosing EITHER
          # allow-licenses OR deny-licenses — not both — so we deny the
          # known-incompatible set rather than maintaining a positive
          # allowlist that breaks every time a new MIT-compatible
          # license appears in the ecosystem.
          deny-licenses: >-
            GPL-2.0, GPL-3.0, AGPL-3.0, LGPL-2.1, LGPL-3.0
          # @sap/approuter 22.x depends on node-forge, whose SPDX expression is
          # BSD-3-Clause OR GPL-2.0-only. ARC-1 uses it under the BSD-3-Clause
          # option; keep the exception version-pinned so future changes are
          # reviewed again.
          allow-dependencies-licenses: pkg:npm/node-forge@1.4.0

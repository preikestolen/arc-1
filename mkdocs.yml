site_name: ARC-1 — SAP ADT MCP Server
site_description: Enterprise-ready MCP proxy for SAP ABAP Development Tools. npm package + Docker image, admin safety controls, works with Claude, Copilot, and all MCP clients.
site_url: https://docs.arc-1-mcp.com/
repo_url: https://github.com/arc-mcp/arc-1
repo_name: arc-mcp/arc-1
edit_uri: edit/main/docs_page/

docs_dir: docs_page

theme:
  name: material
  custom_dir: docs/overrides
  palette:
    # `media` = follow the OS light/dark setting on first visit; the toggle then pins a choice.
    - media: '(prefers-color-scheme: light)'
      scheme: default
      primary: deep orange
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: '(prefers-color-scheme: dark)'
      scheme: slate
      primary: deep orange
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - navigation.instant
    - navigation.expand
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - announce.dismiss
  icon:
    repo: fontawesome/brands/github

nav:
  - Home: index.md
  - Quickstart: quickstart.md
  - Install in Claude: install-in-claude.md
  - Deployment:
      - Overview: deployment.md
      - Docker: docker.md
      - BTP Cloud Foundry: btp-cloud-foundry-deployment.md
      - BTP ABAP Environment: btp-abap-environment.md
      - S/4HANA Public Cloud: s4hana-public-cloud.md
      - Multi-System Hub (mcp-hub): multi-system-hub.md
      - Best Practices: deployment-best-practices.md
  - Auth & Permissions:
      - Overview: enterprise-auth.md
      - Authorization & Roles: authorization.md
      - API Key: api-key-setup.md
      - OAuth / JWT: oauth-jwt-setup.md
      - XSUAA Setup: xsuaa-setup.md
      - Principal Propagation: principal-propagation-setup.md
      - BTP Destination Setup: btp-destination-setup.md
  - Using ARC-1:
      - Tools Reference: tools.md
      - Extensions (Custom Tools): extensions.md
      - MCP Usage Guide: mcp-usage.md
      - Skills: skills.md
      - Blog Series: blog-series.md
  - Reference:
      - Configuration: configuration-reference.md
      - Configuration Precedence: configuration-precedence.md
      - vs SAP ABAP MCP Server: arc-1-vs-sap-abap-mcp-server.md
      - Security: security-guide.md
      - Caching: caching.md
      - Log Analysis: log-analysis.md
      - Updating: updating.md
  - Development:
      - Local Development: local-development.md
      - Architecture: architecture.md
      - CLI Guide: cli-guide.md
      - SAP Trial Setup: sap-trial-setup.md
      - Auth Test Process: auth-test-process.md
      - Roadmap: roadmap.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

plugins:
  - search
  - redirects:
      redirect_maps:
        phase4-btp-deployment.md: btp-cloud-foundry-deployment.md

extra_javascript:
  - javascripts/posthog.js

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/arc-mcp/arc-1
